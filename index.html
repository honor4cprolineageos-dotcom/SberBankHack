<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment System</title>
    <style>
        /* Стили — такие же, как у вас были */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a1f0a 0%, #0d2818 50%, #071207 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 500px; }
        .card {
            background: rgba(10, 25, 10, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 40px 32px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .icon { text-align: center; margin-bottom: 28px; }
        .icon svg { width: 56px; height: 56px; }
        .icon h2 { font-size: 18px; color: rgba(255, 255, 255, 0.6); margin-top: 14px; }
        .info-box {
            background: rgba(34, 197, 94, 0.08);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 28px;
            text-align: center;
        }
        .info-label { color: rgba(255, 255, 255, 0.5); font-size: 12px; margin-bottom: 8px; }
        .info-value { color: #22c55e; font-size: 20px; font-weight: bold; font-family: monospace; }
        .input-group { margin-bottom: 20px; }
        .input-label { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-bottom: 12px; display: block; }
        .input-field {
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid rgba(34, 197, 94, 0.2);
            border-radius: 28px;
            color: white;
            outline: none;
            text-align: center;
            font-family: monospace;
        }
        .input-field:focus { border-color: #22c55e; }
        .send-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #15803d 0%, #166534 100%);
            border: none;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .result.success {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            display: block;
        }
        .result.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            display: block;
        }
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="#22c55e" stroke-width="1.5" fill="none"/>
                <path d="M12 6v6l4 2" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <h2>payment system</h2>
        </div>
        <div class="info-box">
            <div class="info-label">ID получателя</div>
            <input type="text" id="deviceId" class="input-field" placeholder="000000" maxlength="6" style="font-size: 24px; letter-spacing: 4px;">
        </div>
        <div class="input-group">
            <label class="input-label">Сумма оплаты</label>
            <input type="number" id="amount" class="input-field" placeholder="0" step="0.01">
        </div>
        <button class="send-button" id="sendBtn">Отправить на телефон</button>
        <div id="result" class="result"></div>
    </div>
</div>
<script>
    const sendBtn = document.getElementById('sendBtn');
    const deviceIdInput = document.getElementById('deviceId');
    const amountInput = document.getElementById('amount');
    const resultDiv = document.getElementById('result');

    sendBtn.onclick = async function() {
        const deviceId = deviceIdInput.value.trim();
        const amount = amountInput.value.replace(',', '.');

        if (!deviceId || deviceId.length !== 6) {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = 'Введите корректный 6-значный ID';
            return;
        }
        if (!amount || amount <= 0) {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = 'Введите сумму оплаты';
            return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = 'Отправка <span class="loading"></span>';

        try {
            // Отправляем запрос на ОБНОВЛЕНИЕ БАЛАНСА в базе данных
            const response = await fetch(`https://ВАШ_ДОМЕН/api.php?action=update_balance&device_id=${deviceId}&amount=${amount}`);
            const data = await response.json();

            if (data.success) {
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `✅ Сумма ${amount} ₽ зафиксирована на устройстве ${deviceId}`;
                amountInput.value = '';
            } else {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = data.error || 'Ошибка при обновлении баланса';
            }
        } catch (error) {
            resultDiv.className = 'result error';
            resultDiv.innerHTML = 'Ошибка сети: ' + error.message;
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = 'Отправить на телефон';
            setTimeout(() => resultDiv.className = 'result', 3000);
        }
    };
</script>
</body>
</html>
